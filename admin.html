<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ichibot Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #343a40; color: white; padding-top: 20px;}
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 10px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { color: white; background: #495057; }
        .content { padding: 20px; }
        .file-list { max-height: 80vh; overflow-y: auto; }
        .list-group-item { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .list-group-item:hover { background-color: #e9ecef; }
        .list-group-item.active { background-color: #0d6efd; border-color: #0d6efd; color: white;}
        .btn-delete { color: #dc3545; background: none; border: none; padding: 0; font-size: 1.2rem; line-height: 1; }
        .list-group-item.active .btn-delete { color: #ffc107; }
        .btn-delete:hover { color: #bd2130; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar">
                <h4 class="text-center mb-4">Ichibot Admin</h4>
                <a href="#" class="active" onclick="loadFiles('products')">Produk</a>
                <a href="#" onclick="loadFiles('pelatihan')">Pelatihan</a>
                <a href="#" onclick="loadFiles('blog')">Blog (Pencapaian)</a>
                <a href="#" onclick="loadFiles('events')">Events</a>
            </div>

            <!-- Content Area -->
            <div class="col-md-3 pt-4 border-end">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0">Daftar Halaman</h5>
                    <button class="btn btn-sm btn-success" onclick="openCreateModal()">+ Tambah</button>
                </div>
                <div class="file-list list-group" id="file-list">
                    <!-- Files -->
                </div>
            </div>

            <div class="col-md-7 content pt-4">
                <h4 id="editor-title">Pilih halaman untuk diedit</h4>
                <div id="editor-container" style="display:none;">
                    <form id="edit-form">
                        <input type="hidden" id="file-name">
                        <input type="hidden" id="page-type">
                        
                        <div class="mb-3">
                            <label class="form-label">Judul Halaman</label>
                            <input type="text" class="form-control" id="title" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Image URL</label>
                            <input type="text" class="form-control" id="image">
                        </div>

                        <!-- Product & Event -->
                        <div id="product-fields" style="display:none;">
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Harga (Opsional)</label>
                                    <input type="text" class="form-control" id="price">
                                </div>
                                <div class="col">
                                    <label class="form-label">Harga Coret (Opsional)</label>
                                    <input type="text" class="form-control" id="price_coret">
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Deskripsi Singkat</label>
                                <textarea class="form-control" id="description" rows="3"></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Teks WhatsApp</label>
                                <input type="text" class="form-control" id="whatsapp_text">
                            </div>

                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Spesifikasi Kolom 1 (Pisahkan dengan baris baru)</label>
                                    <textarea class="form-control" id="specs1" rows="5"></textarea>
                                </div>
                                <div class="col">
                                    <label class="form-label">Spesifikasi Kolom 2 (Pisahkan dengan baris baru)</label>
                                    <textarea class="form-control" id="specs2" rows="5"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Blog -->
                        <div id="blog-fields" style="display:none;">
                            <div class="mb-3">
                                <label class="form-label">Badge / Kategori / Tanggal</label>
                                <input type="text" class="form-control" id="badge">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Konten Artikel</label>
                                <textarea id="blog-content"></textarea>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary mt-3">Simpan Perubahan</button>
                    </form>
                    <div id="alert-msg" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Modal -->
    <div class="modal fade" id="createModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Tambah Halaman Baru</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="create-form">
              <div class="mb-3">
                <label class="form-label">Kategori</label>
                <input type="text" class="form-control" id="create-category" readonly>
              </div>
              <div class="mb-3">
                <label class="form-label">Nama File (harus berakhiran .html)</label>
                <div class="input-group">
                  <span class="input-group-text" id="file-prefix"></span>
                  <input type="text" class="form-control" id="create-filename" placeholder="nama-baru.html" required>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Judul Utama</label>
                <input type="text" class="form-control" id="create-title" required>
              </div>
              <button type="submit" class="btn btn-success w-100">Buat Halaman</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allPages = {};
        let currentCategory = 'products';
        let createModal;

        tinymce.init({
            selector: '#blog-content',
            height: 400,
            plugins: 'lists link image code',
            toolbar: 'undo redo | formatselect | bold italic | alignleft aligncenter alignright | bullist numlist outdent indent | link image | code'
        });

        document.addEventListener('DOMContentLoaded', () => {
            createModal = new bootstrap.Modal(document.getElementById('createModal'));
            fetchPages();
        });

        function fetchPages() {
            fetch('http://localhost:3000/api/pages')
                .then(res => res.json())
                .then(data => {
                    allPages = data;
                    loadFiles(currentCategory);
                });
        }

        function loadFiles(category) {
            currentCategory = category;
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            event && event.target && event.target.classList && event.target.classList.add('active');

            const list = document.getElementById('file-list');
            list.innerHTML = '';
            
            if (!allPages[category]) return;

            allPages[category].forEach(file => {
                const item = document.createElement('div');
                item.className = 'list-group-item list-group-item-action';
                
                const span = document.createElement('span');
                span.textContent = file;
                span.style.flex = "1";
                span.onclick = () => {
                    document.querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    loadFileDetails(file);
                };
                
                const delBtn = document.createElement('button');
                delBtn.innerHTML = '&times;';
                delBtn.className = 'btn-delete';
                delBtn.title = 'Hapus File';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if(confirm(`Yakin ingin menghapus ${file} beserta tautannya di halaman index?`)) {
                        deleteFile(file);
                    }
                };

                item.appendChild(span);
                item.appendChild(delBtn);
                list.appendChild(item);
            });
        }

        function openCreateModal() {
            document.getElementById('create-category').value = currentCategory;
            let prefix = '';
            if(currentCategory === 'products') prefix = 'product-';
            if(currentCategory === 'pelatihan') prefix = 'pelatihan-';
            if(currentCategory === 'blog') prefix = 'achievement-';
            if(currentCategory === 'events') prefix = 'event-';
            document.getElementById('file-prefix').textContent = prefix;
            document.getElementById('create-filename').value = '';
            document.getElementById('create-title').value = '';
            createModal.show();
        }

        document.getElementById('create-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const prefix = document.getElementById('file-prefix').textContent;
            let filename = prefix + document.getElementById('create-filename').value;
            if(!filename.endsWith('.html')) filename += '.html';
            
            const payload = {
                category: currentCategory,
                filename: filename,
                title: document.getElementById('create-title').value
            };

            fetch('http://localhost:3000/api/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => res.json()).then(data => {
                if(data.success) {
                    createModal.hide();
                    fetchPages(); // reload lists
                } else {
                    alert(data.error);
                }
            });
        });

        function deleteFile(file) {
            fetch('http://localhost:3000/api/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ category: currentCategory, file: file })
            }).then(res => res.json()).then(data => {
                if(data.success) {
                    document.getElementById('editor-container').style.display = 'none';
                    document.getElementById('editor-title').textContent = 'Pilih halaman untuk diedit';
                    fetchPages();
                }
            });
        }

        function loadFileDetails(file) {
            fetch(`http://localhost:3000/api/page?file=${file}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('editor-container').style.display = 'block';
                    document.getElementById('editor-title').textContent = `Editing: ${file}`;
                    document.getElementById('alert-msg').innerHTML = '';
                    
                    document.getElementById('file-name').value = data.file;
                    document.getElementById('page-type').value = data.type;
                    document.getElementById('title').value = data.title || '';
                    document.getElementById('image').value = data.image || '';

                    if (data.type === 'products' || data.type === 'pelatihan' || data.type === 'events') {
                        document.getElementById('product-fields').style.display = 'block';
                        document.getElementById('blog-fields').style.display = 'none';
                        
                        document.getElementById('price').value = data.price || '';
                        document.getElementById('price_coret').value = data.price_coret || '';
                        document.getElementById('description').value = data.description || '';
                        document.getElementById('whatsapp_text').value = data.whatsapp_text || '';
                        
                        document.getElementById('specs1').value = (data.specs1 || []).join('\\n');
                        document.getElementById('specs2').value = (data.specs2 || []).join('\\n');
                        
                        if(data.type === 'events') {
                            document.getElementById('blog-fields').style.display = 'block';
                            document.getElementById('badge').value = data.badge || '';
                            tinymce.get('blog-content').editorContainer.style.display = 'none';
                        } else {
                            if(tinymce.get('blog-content')) tinymce.get('blog-content').editorContainer.style.display = 'block';
                        }
                    } else if (data.type === 'blog') {
                        document.getElementById('product-fields').style.display = 'none';
                        document.getElementById('blog-fields').style.display = 'block';
                        if(tinymce.get('blog-content')) tinymce.get('blog-content').editorContainer.style.display = 'block';
                        
                        document.getElementById('badge').value = data.badge || '';
                        tinymce.get('blog-content').setContent(data.content || '');
                    }
                });
        }

        document.getElementById('edit-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const payload = {
                file: document.getElementById('file-name').value,
                type: document.getElementById('page-type').value,
                title: document.getElementById('title').value,
                image: document.getElementById('image').value
            };

            if (payload.type === 'products' || payload.type === 'pelatihan' || payload.type === 'events') {
                payload.price = document.getElementById('price').value;
                payload.price_coret = document.getElementById('price_coret').value;
                payload.description = document.getElementById('description').value;
                payload.whatsapp_text = document.getElementById('whatsapp_text').value;
                payload.specs1 = document.getElementById('specs1').value.split('\\n').filter(s => s.trim());
                payload.specs2 = document.getElementById('specs2').value.split('\\n').filter(s => s.trim());
                if(payload.type === 'events') payload.badge = document.getElementById('badge').value;
            } else if (payload.type === 'blog') {
                payload.badge = document.getElementById('badge').value;
                payload.content = tinymce.get('blog-content').getContent();
            }

            fetch('http://localhost:3000/api/page', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => res.json()).then(data => {
                if (data.success) {
                    const alert = document.createElement('div');
                    alert.className = 'alert alert-success';
                    alert.textContent = 'Perubahan berhasil disimpan! Halaman Index juga telah diperbarui.';
                    document.getElementById('alert-msg').innerHTML = '';
                    document.getElementById('alert-msg').appendChild(alert);
                    setTimeout(() => alert.remove(), 3000);
                }
            });
        });
    </script>
</body>
</html>
